<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Title and Logo -->
    <title>English Window Vocabulary-FAQ-Explorer</title>
    <link rel="shortcut icon" href="assets/logo.png" type="image/x-icon" />

    <!-- Font awesome CDN -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <!-- Tailwind and daisy UI -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Poppins -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <!-- Hind Siliguri -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- Style  -->
    <link rel="stylesheet" href="style.css" />
    <style>
      .poppins {
        font-family: "Poppins";
        font-weight: 500;
        font-style: normal;
      }
      .bangla {
        font-family: "Hind Siliguri";
        font-style: normal;
      }
      .active {
        background-color: #422ad5;
        color: white;
      }
    </style>
  </head>
  <body class="poppins">
    <header class="shadow-sm shadow-gray-300">
      <nav
        class="container mx-auto flex justify-between items-center py-3 px-3 md:px-0"
      >
        <div class="navbar-start inline-flex sm:hidden">
          <div class="dropdown">
            <div tabindex="0" role="button" class="btn btn-ghost lg:hidden">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="h-5 w-5"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M4 6h16M4 12h8m-8 6h16"
                />
              </svg>
            </div>
            <ul
              tabindex="-1"
              class="menu menu-sm dropdown-content bg-base-100 rounded-box z-1 mt-3 w-40 shadow items-center"
            >
              <li>
                <a href=""
                  ><button class="btn btn-outline w-25">
                    <i class="fa-solid fa-circle-question"></i>
                    FAQ
                  </button></a
                >
              </li>
              <li>
                <a href=""
                  ><button class="btn btn-outline w-25 mx-2">
                    <i class="fa-solid fa-book-open"></i>
                    Learn
                  </button></a
                >
              </li>
              <li>
                <a href="">
                  <button class="btn btn-outline w-25">
                    <i class="fa-solid fa-arrow-right-from-bracket"></i>
                    Logout
                  </button>
                </a>
              </li>
            </ul>
          </div>
        </div>
        <div class="gap-1 flex items-center">
          <h2 class="font-bold">English</h2>
          <i
            class="fa-brands fa-windows fa-2xl"
            style="color: hsl(206, 58%, 63%)"
          ></i>
          <h2 class="bangla">জানালা</h2>
        </div>
        <div class="gap-5 hidden sm:inline-flex">
          <ul class="flex">
            <li>
              <a href=""
                ><button class="btn btn-outline btn-primary">
                  <i class="fa-solid fa-circle-question"></i>
                  FAQ
                </button></a
              >
            </li>
            <li>
              <a href=""
                ><button class="btn btn-outline btn-primary mx-2">
                  <i class="fa-solid fa-book-open"></i>
                  Learn
                </button></a
              >
            </li>
            <li>
              <a href="">
                <button class="btn btn-outline btn-primary">
                  <i class="fa-solid fa-arrow-right-from-bracket"></i>
                  Logout
                </button>
              </a>
            </li>
          </ul>
        </div>
      </nav>
    </header>

    <!-- English is Easy!! Section -->
    <section
      class="flex flex-col-reverse md:flex-row justify-between container mx-auto items-center py-8 gap-2"
    >
      <div class="space-y-5 mx-auto text-center md:text-start">
        <h2 class="text-4xl font-bold">
          <span class="text-[#00BCFF]">English</span> is Easy!!
        </h2>
        <p class="bangla font-semibold px-5 md:p-0">
          আজ থেকেই আপনার ভাষা শেখার যাত্রা শুরু করুন। আপনি যদি নতুন হন অথবা
          আপনার দক্ষতা বাড়াতে চান, আমাদের Interactive Lessons আপনাকে নিয়ে যাবে
          অন্য একটি Level এ
        </p>
        <div class="grid grid-cols-1 w-[60%] md:w-60 gap-5 mx-auto md:mx-0">
          <input
            type="text"
            placeholder="Enter Your Name"
            class="outline-none p-2 rounded-xl border border-gray-400"
          />
          <input
            type="password"
            placeholder="Enter Your Password"
            class="outline-none p-2 rounded-xl border border-gray-400"
          />
        </div>
        <button class="btn btn-primary w-[60%] md:w-60 rounded-xl">
          Get Started
        </button>
      </div>
      <div class="p-4 md:p-0">
        <img src="./assets/hero-student.png" alt="" class="mx-auto" />
      </div>
    </section>

    <!-- Let's Learn Vocabularies section -->
    <section class="my-20">
      <h2 class="text-4xl font-bold text-center mb-5">
        <span class="text-[#00BCFF]">Let's</span> Learn Vocabularies
      </h2>
      <div
        id="level-container"
        class="flex flex-wrap justify-center gap-5"
      ></div>
    </section>

    <!-- Search section -->
    <section class="flex justify-center my-10">
      <div class="join">
        <div>
          <label class="input validator join-item outline-none">
            <input
              id="input-search"
              type="text"
              required
              placeholder="Search Your vocabulary"
            />
          </label>
        </div>
        <button id="btn-search" class="btn btn-primary join-item">
          Search
        </button>
      </div>
    </section>

    <!-- Word-container section -->
    <section
      id="word-container"
      class="bg-gray-200 p-10 container mx-auto mt-5 rounded-lg grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-5"
    >
      <div
        class="text-center bg-sky-50 col-span-full bangla rounded-xl py-10 space-y-5"
      >
        <img src="./assets/alert-error.png" alt="" class="mx-auto" />
        <p class="text-2xl text-gray-700 font-semibold">
          You have not selected any lesson yet.
        </p>
        <p class="text-2xl text-gray-800">Please select a lesson.</p>
      </div>
    </section>

    <!-- Spinner section -->
    <section id="spinner" class="flex justify-center items-center p-10 hidden">
      <span class="loading loading-spinner text-primary"></span>
    </section>

    <!-- Open the modal using ID.showModal() method -->
    <!-- <button class="btn" onclick="my_modal_5.showModal()">open modal</button> -->
    <dialog id="word_modal" class="modal modal-bottom sm:modal-middle">
      <div class="modal-box">
        <div id="details-container" class=""></div>
        <div class="modal-action">
          <form method="dialog">
            <!-- if there is a button in form, it will close the modal -->
            <button class="btn btn-primary">Close</button>
          </form>
        </div>
      </div>
    </dialog>

    <!-- Scripts -->
    <script src="./scripts/level.js"></script>
  </body>
</html>
